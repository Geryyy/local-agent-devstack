name: Local Agent Devstack - host localhost
version: 1.0.0
schema: v1

# Use this config when Continue runs on the laptop host and the SSH tunnel
# is reachable at 127.0.0.1:11434.
#
# This matches the default safer bind:
#   LOCAL_OLLAMA_BIND_HOST=127.0.0.1
#
# It also usually works with:
#   LOCAL_OLLAMA_BIND_HOST=0.0.0.0
#
# If you bind the tunnel to a specific Docker bridge address such as
# 172.17.0.1, update apiBase in the live Continue config to that address.

models:
  - name: local-coder
    provider: ollama
    model: gpt-oss:20b
    apiBase: http://127.0.0.1:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-reasoner
    provider: ollama
    model: gpt-oss:20b
    apiBase: http://127.0.0.1:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-fallback
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://127.0.0.1:11434
    roles: [chat, edit]
    capabilities: [tool_use]

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
