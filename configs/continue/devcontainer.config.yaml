name: Local Agent Devstack - devcontainer
version: 1.0.0
schema: v1

# Use this config when Continue runs inside a devcontainer and the container
# can resolve and reach host.docker.internal.
#
# Typical requirements:
# - devcontainer runArgs includes:
#     --add-host=host.docker.internal:host-gateway
# - the laptop SSH tunnel is bound to an address the container can reach

models:
  - name: local-coder
    provider: ollama
    model: gpt-oss:20b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-reasoner
    provider: ollama
    model: gpt-oss:20b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-fallback
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit]
    capabilities: [tool_use]

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
