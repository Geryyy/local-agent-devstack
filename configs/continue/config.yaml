name: Local Agent Devstack
version: 1.0.0
schema: v1

models:
  - name: local-coder
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-reasoner
    provider: ollama
    model: qwen2.5:7b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit, apply]
    capabilities: [tool_use]

  - name: local-fallback
    provider: ollama
    model: granite-code:8b
    apiBase: http://host.docker.internal:11434
    roles: [chat, edit]
    capabilities: [tool_use]

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
